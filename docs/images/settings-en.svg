<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720"><rect x="0" y="0" width="1200" height="720" rx="24" fill="#181818"/><rect x="70" y="45" width="1060" height="620" rx="18" fill="#222222" stroke="#444444"/><text x="115" y="105" fill="#f2f2f2" font-family="Arial, Tahoma, sans-serif" font-size="32" font-weight="700" text-anchor="start">Settings</text><text x="115" y="165" fill="#eeeeee" font-family="Arial, Tahoma, sans-serif" font-size="22" font-weight="600" text-anchor="start">Scan automatically when the panel opens</text><text x="115" y="196" fill="#a5a5a5" font-family="Arial, Tahoma, sans-serif" font-size="16" font-weight="400" text-anchor="start">Build the review list automatically. Scanning is read-only.</text><rect x="940" y="147" width="90" height="44" rx="22" fill="#7c3aed"/><circle cx="1008" cy="169" r="17" fill="white"/><line x1="115" y1="230" x2="1085" y2="230" stroke="#444444"/><text x="115" y="290" fill="#eeeeee" font-family="Arial, Tahoma, sans-serif" font-size="22" font-weight="600" text-anchor="start">File extensions</text><text x="115" y="321" fill="#a5a5a5" font-family="Arial, Tahoma, sans-serif" font-size="16" font-weight="400" text-anchor="start">Choose which attachment types are included.</text><rect x="710" y="267" width="320" height="58" rx="9" fill="#181818" stroke="#555555"/><text x="730" y="302" fill="#dddddd" font-family="Arial, Tahoma, sans-serif" font-size="16" font-weight="400" text-anchor="start">png, jpg, pdf, mp3, mp4…</text><line x1="115" y1="355" x2="1085" y2="355" stroke="#444444"/><text x="115" y="415" fill="#eeeeee" font-family="Arial, Tahoma, sans-serif" font-size="22" font-weight="600" text-anchor="start">Excluded folders</text><text x="115" y="446" fill="#a5a5a5" font-family="Arial, Tahoma, sans-serif" font-size="16" font-weight="400" text-anchor="start">Skip complete folders and their subfolders.</text><rect x="710" y="392" width="320" height="58" rx="9" fill="#181818" stroke="#555555"/><text x="730" y="427" fill="#dddddd" font-family="Arial, Tahoma, sans-serif" font-size="16" font-weight="400" text-anchor="start">Templates, Archive</text><line x1="115" y1="480" x2="1085" y2="480" stroke="#444444"/><text x="115" y="540" fill="#eeeeee" font-family="Arial, Tahoma, sans-serif" font-size="22" font-weight="600" text-anchor="start">Minimum file age</text><text x="115" y="571" fill="#a5a5a5" font-family="Arial, Tahoma, sans-serif" font-size="16" font-weight="400" text-anchor="start">Ignore newly added files for a chosen number of hours.</text><rect x="710" y="517" width="320" height="58" rx="9" fill="#181818" stroke="#555555"/><text x="730" y="552" fill="#dddddd" font-family="Arial, Tahoma, sans-serif" font-size="16" font-weight="400" text-anchor="start">24</text><line x1="115" y1="605" x2="1085" y2="605" stroke="#444444"/></svg>