<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <rect width="1200" height="720" rx="24" fill="#181818"/>
  <rect x="55" y="45" width="1090" height="630" rx="18" fill="#202020" stroke="#444"/>
  <text x="95" y="105" fill="#f2f2f2" font-family="Arial, sans-serif" font-size="34" font-weight="700">Safe Attachment Trash</text>
  <text x="95" y="142" fill="#aaa" font-family="Arial, sans-serif" font-size="18">Review first. Nothing is moved automatically.</text>
  <g font-family="Arial, sans-serif" font-size="18">
    <rect x="95" y="175" width="190" height="46" rx="10" fill="#7c3aed"/><text x="125" y="205" fill="white">Unused (3)</text>
    <rect x="295" y="175" width="160" height="46" rx="10" fill="#303030"/><text x="335" y="205" fill="#ddd">Trash (1)</text>
    <rect x="465" y="175" width="190" height="46" rx="10" fill="#303030"/><text x="495" y="205" fill="#ddd">Protected (2)</text>
    <rect x="820" y="175" width="255" height="46" rx="10" fill="#303030" stroke="#555"/><text x="850" y="205" fill="#ddd">Scan and refresh</text>
  </g>
  <rect x="95" y="250" width="980" height="355" rx="14" fill="#262626" stroke="#444"/>
  <g font-family="Arial, sans-serif">
    <text x="125" y="295" fill="#aaa" font-size="17">☐ Select all</text>
    <line x1="95" y1="320" x2="1075" y2="320" stroke="#444"/>
    <g transform="translate(0,0)">
      <text x="125" y="366" fill="#ddd" font-size="24">☐  diagram.png</text>
      <text x="165" y="396" fill="#999" font-size="16">Attachments/Images/diagram.png</text>
      <rect x="690" y="345" width="90" height="38" rx="8" fill="#333"/><text x="713" y="371" fill="#ddd" font-size="16">Open</text>
      <rect x="790" y="345" width="145" height="38" rx="8" fill="#7c3aed"/><text x="813" y="371" fill="white" font-size="16">Move to trash</text>
      <rect x="945" y="345" width="105" height="38" rx="8" fill="#333"/><text x="960" y="371" fill="#ddd" font-size="16">Protect</text>
    </g>
    <line x1="95" y1="425" x2="1075" y2="425" stroke="#444"/>
    <text x="125" y="471" fill="#ddd" font-size="24">☐  reference.pdf</text>
    <text x="165" y="501" fill="#999" font-size="16">Attachments/PDF/reference.pdf</text>
    <rect x="690" y="450" width="90" height="38" rx="8" fill="#333"/><text x="713" y="476" fill="#ddd" font-size="16">Open</text>
    <rect x="790" y="450" width="145" height="38" rx="8" fill="#7c3aed"/><text x="813" y="476" fill="white" font-size="16">Move to trash</text>
    <rect x="945" y="450" width="105" height="38" rx="8" fill="#333"/><text x="960" y="476" fill="#ddd" font-size="16">Protect</text>
    <line x1="95" y1="530" x2="1075" y2="530" stroke="#444"/>
    <text x="125" y="575" fill="#aaa" font-size="17">Scanning only creates this review list.</text>
  </g>
</svg>
