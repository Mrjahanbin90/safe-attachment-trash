name: Build and release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          cache: npm

      - name: Pin npm version
        run: npm install --global npm@11.6.1

      - name: Show tool versions
        run: |
          node --version
          npm --version
          npm config get registry

      - name: Verify package lock uses the public registry
        shell: bash
        run: |
          if grep -Eq "applied-caas|internal\.api\.openai\.org" package-lock.json; then
            echo "package-lock.json contains a private/internal registry URL."
            echo "Regenerate it with https://registry.npmjs.org/ before releasing."
            exit 1
          fi

      - name: Install dependencies
        shell: bash
        run: |
          if ! npm ci --registry=https://registry.npmjs.org/; then
            echo "npm ci failed — printing npm debug logs:"
            ls -lah "$HOME/.npm/_logs" || true
            sed -n '1,400p' "$HOME"/.npm/_logs/*.log || true
            exit 1
          fi

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Verify tag matches manifest
        shell: bash
        run: |
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          if [ "$MANIFEST_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match manifest version $MANIFEST_VERSION"
            exit 1
          fi

      - name: Attest release assets
        uses: actions/attest@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
          gh release upload "$GITHUB_REF_NAME" main.js manifest.json styles.css --clobber
